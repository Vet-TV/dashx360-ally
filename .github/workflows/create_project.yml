name: Create Roadmap Project

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write
  packages: write
  metadata: read
  pages: write
  id-token: write
  # projects: write is not available here but GITHUB_TOKEN may still create projects via GraphQL

jobs:
  create-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Create Projects v2 Roadmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          owner="${REPO%%/*}"
          repo="${REPO#*/}"

          echo "Fetching repository node id for $REPO"
          repo_query=$(jq -n --arg owner "$owner" --arg repo "$repo" '{"query":"query($owner: String!, $repo: String!){ repository(owner:$owner, name:$repo){ id } }","variables":{"owner":$owner,"repo":$repo}}')
          repo_id=$(curl -s -H "Authorization: bearer $GITHUB_TOKEN" -X POST -d "$repo_query" https://api.github.com/graphql | jq -r '.data.repository.id')

          if [ "$repo_id" = "null" ] || [ -z "$repo_id" ]; then
            echo "Failed to fetch repository id. Exiting."
            exit 1
          fi

          echo "Repository node id: $repo_id"

          create_mutation=$(jq -n --arg ownerId "$repo_id" '{"query":"mutation($input: CreateProjectV2Input!){ createProjectV2(input:$input){ projectV2{ id title } } }","variables":{"input": {"ownerId": $ownerId, "title":"Roadmap","shortDescription":"Project roadmap for DashX360 Ally - autogenerated"}}}')

          resp=$(curl -s -H "Authorization: bearer $GITHUB_TOKEN" -X POST -d "$create_mutation" https://api.github.com/graphql)
          project_id=$(echo "$resp" | jq -r '.data.createProjectV2.projectV2.id')

          if [ "$project_id" = "null" ] || [ -z "$project_id" ]; then
            echo "Project creation failed. Response:" >&2
            echo "$resp" >&2
            exit 1
          fi

          echo "Created project: $project_id"

          # Add some starter items to the project
          for title in "MVP Setup" "Local Library Scan" "Xbox Cloud Integration" "Epic Integration" "GOG Integration" "Emulation Support" "ROG Ally Optimization" "Shell Integration" "Beta Release" "v1.0 Release"; do
            add_item=$(jq -n --arg projectId "$project_id" --arg title "$title" '{"query":"mutation($input: AddProjectV2ItemInput!){ addProjectV2Item(input:$input){ item { id } } }","variables":{"input":{"projectId":$projectId, "content": null, "title": $title}}}')
            # Use REST endpoint to add project item via GraphQL
            curl -s -H "Authorization: bearer $GITHUB_TOKEN" -X POST -d "$add_item" https://api.github.com/graphql > /dev/null || true
          done

          echo "Starter items added (best-effort)."

      - name: Create supporting docs note
        run: |
          echo "Project 'Roadmap' creation attempted. See docs/PROJECT_BOARD.md for details and troubleshooting." 
